<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBF Bill System Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        /* Web Preview Styling */
        .preview-paper {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 20mm;
            margin: 0 auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            #preview-zoom {
                transform: scale(0.42);
                transform-origin: top center;
                margin-bottom: -150%;
            }
        }

        .nav-tab-active {
            border-bottom: 3px solid #0f172a;
            color: #0f172a;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- Mobile Nav -->
    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b z-50 flex lg:hidden">
        <button onclick="switchTab('edit')" id="tab-edit"
            class="flex-1 py-4 nav-tab-active uppercase text-xs tracking-widest">Edit Bill</button>
        <button onclick="switchTab('preview')" id="tab-preview"
            class="flex-1 py-4 text-slate-400 uppercase text-xs tracking-widest">Live Preview</button>
    </nav>

    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- EDITOR -->
        <div id="view-edit" class="w-full lg:w-1/3 bg-white p-6 border-r shadow-inner overflow-y-auto">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-8 tracking-tight">Bill Generator</h1>

            <div class="space-y-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Customer
                        Information</label>
                    <input type="text" id="inCustName" oninput="update()" placeholder="PARTY NAME"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all font-semibold"
                        value="SUMAN BHAI">
                    <textarea id="inCustAddr" oninput="update()" placeholder="ADDRESS"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all"
                        rows="2">ERU CHAR RASTA</textarea>
                    <input type="date" id="inDate" oninput="update()"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 font-medium">
                </div>

                <div id="itemInputs" class="space-y-4">
                    <div class="flex justify-between items-end">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Items List</label>
                    </div>
                    <!-- Item entry -->
                    <div class="item-row bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3 relative">
                        <input type="text" placeholder="Description"
                            class="w-full bg-transparent border-b border-slate-300 pb-2 inDesc font-medium outline-none focus:border-slate-900"
                            oninput="update()" value="Dining Table">
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <span class="text-[9px] font-bold text-slate-400 uppercase">Qty</span>
                                <input type="number" placeholder="0"
                                    class="w-full bg-transparent border-b border-slate-300 inQty outline-none focus:border-slate-900"
                                    oninput="update()" value="1">
                            </div>
                            <div class="flex-1">
                                <span class="text-[9px] font-bold text-slate-400 uppercase">Rate</span>
                                <input type="number" placeholder="0"
                                    class="w-full bg-transparent border-b border-slate-300 inRate outline-none focus:border-slate-900"
                                    oninput="update()" value="24000">
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="addNewRow()"
                    class="w-full py-3 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 hover:text-slate-600 transition-all">+
                    Add Item</button>

                <button onclick="downloadPDF()"
                    class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-xl shadow-slate-200 active:scale-95 transition-all">GENERATE
                    & DOWNLOAD PDF</button>
            </div>
        </div>

        <!-- PREVIEW (Web) -->
        <div id="view-preview" class="hidden lg:block w-full lg:w-2/3 bg-slate-100 p-8 overflow-auto">
            <div id="preview-zoom">
                <div class="preview-paper text-slate-900">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h2 class="text-3xl font-black tracking-tight mb-1">New Jay Bhavani Furniture</h2>
                            <p class="text-xs text-slate-500 leading-relaxed">
                                Shop no. 5, Sai complex, Sitaram nagar, Eru char rasta,<br>
                                Abrama Road, Navsari - 396450<br>
                                Contact : 98252 98696 | jbf01nvs@gmail.com
                            </p>
                        </div>
                        <img id="logoImg" src="logo.png" class="w-24 h-24 object-contain">
                    </div>
                    <div class="h-px bg-slate-900 w-full mb-8"></div>

                    <div class="flex justify-between mb-10">
                        <div class="space-y-1">
                            <span class="text-xs font-bold uppercase text-slate-400">To,</span>
                            <div id="outName" class="text-xl font-bold tracking-tight">SUMAN BHAI</div>
                            <div id="outAddr" class="text-sm text-slate-600 uppercase">ERU CHAR RASTA</div>
                        </div>
                        <div class="text-right space-y-1">
                            <span class="text-xs font-bold uppercase text-slate-400">Date</span>
                            <div id="outDate" class="text-lg font-bold">16/04/2026</div>
                        </div>
                    </div>

                    <div id="table-placeholder" class="border border-slate-200 rounded-lg overflow-hidden mb-8">
                        <!-- Table will render here -->
                        <div class="p-20 text-center text-slate-300 italic">Bill items will appear here in the PDF...
                        </div>
                    </div>

                    <div class="flex justify-end pt-4 border-t-2 border-slate-900">
                        <div class="flex items-center gap-12">
                            <span class="text-lg font-bold text-slate-400 uppercase tracking-tighter">Grand
                                total-A</span>
                            <span class="text-2xl font-black" id="outTotal">Rs. 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('inDate').valueAsDate = new Date();

        function switchTab(tab) {
            const ev = document.getElementById('view-edit');
            const pv = document.getElementById('view-preview');
            const te = document.getElementById('tab-edit');
            const tp = document.getElementById('tab-preview');
            if (tab === 'edit') {
                ev.classList.remove('hidden'); pv.classList.add('hidden');
                te.classList.add('nav-tab-active'); tp.classList.remove('nav-tab-active');
            } else {
                ev.classList.add('hidden'); pv.classList.remove('hidden');
                tp.classList.add('nav-tab-active'); te.classList.remove('nav-tab-active');
                update();
            }
        }

        function addNewRow() {
            const div = document.createElement('div');
            div.className = 'item-row bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3 relative';
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); update()" class="absolute top-2 right-2 text-slate-300 hover:text-red-500">✕</button>
                <input type="text" placeholder="Description" class="w-full bg-transparent border-b border-slate-300 pb-2 inDesc font-medium outline-none focus:border-slate-900" oninput="update()">
                <div class="flex gap-4">
                    <div class="flex-1">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Qty</span>
                        <input type="number" placeholder="0" class="w-full bg-transparent border-b border-slate-300 inQty outline-none focus:border-slate-900" oninput="update()">
                    </div>
                    <div class="flex-1">
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Rate</span>
                        <input type="number" placeholder="0" class="w-full bg-transparent border-b border-slate-300 inRate outline-none focus:border-slate-900" oninput="update()">
                    </div>
                </div>`;
            document.getElementById('itemInputs').appendChild(div);
        }

        function update() {
            document.getElementById('outName').innerText = document.getElementById('inCustName').value.toUpperCase();
            document.getElementById('outAddr').innerText = document.getElementById('inCustAddr').value.toUpperCase();
            document.getElementById('outDate').innerText = document.getElementById('inDate').value.split('-').reverse().join('/');

            let total = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const q = parseFloat(row.querySelector('.inQty').value) || 0;
                const r = parseFloat(row.querySelector('.inRate').value) || 0;
                total += (q * r);
            });
            document.getElementById('outTotal').innerText = 'Rs. ' + total.toLocaleString('en-IN');
        }

        function numberToWords(num) {
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            if ((num = num.toString()).length > 9) return 'Overflow';
            let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!n) return '';
            let str = '';
            str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
            str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
            str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
            str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
            str += (n[5] != 0) ? (str != '' ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) : '';
            return str.trim();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();

            // HEADER
            doc.setFont("helvetica", "bold"); doc.setFontSize(24);
            doc.text("New Jay Bhavani Furniture", 15, 25);

            // LOGO (Aspect Ratio Corrected)
            const img = document.getElementById('logoImg');
            if (img && img.naturalWidth > 0) {
                const maxWidth = 25, maxHeight = 25;
                const ratio = img.naturalWidth / img.naturalHeight;
                let w = maxWidth, h = maxWidth / ratio;
                if (h > maxHeight) { h = maxHeight; w = h * ratio; }
                doc.addImage(img, 'PNG', 195 - w, 12, w, h);
            }

            // ADDRESS (Spacing increased to 35mm)
            doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(100);
            doc.text(["Shop no. 5, Sai complex, Sitaram nagar, Eru char rasta,", "Abrama Road, Navsari - 396450", "Contact : 98252 98696 | jbf01nvs@gmail.com"], 15, 32);

            // SEPARATOR (Elegant Thin Line)
            doc.setDrawColor(30); doc.setLineWidth(0.4);
            doc.line(15, 48, 195, 48);

            // CLIENT INFO
            doc.setTextColor(0); doc.setFontSize(11);
            doc.setFont(undefined, "normal"); doc.text("To,", 15, 58);
            doc.setFont(undefined, "bold"); doc.text("Date", 165, 58);
            doc.setFont(undefined, "normal"); doc.text(document.getElementById('outDate').innerText, 195, 58, { align: 'right' });

            doc.setFontSize(14); doc.setFont(undefined, "bold");
            doc.text(document.getElementById('outName').innerText, 15, 66);
            doc.setFontSize(10); doc.setFont(undefined, "normal"); doc.setTextColor(80);
            doc.text(document.getElementById('outAddr').innerText, 15, 72);

            // TABLE (Contrast Adjustment)
            const rows = [];
            let grandTotal = 0;
            const items = document.querySelectorAll('.item-row');
            for (let i = 0; i < 15; i++) {
                const it = items[i];
                const d = it ? it.querySelector('.inDesc').value : "";
                const q = it ? it.querySelector('.inQty').value : "";
                const r = it ? parseFloat(it.querySelector('.inRate').value) || 0 : 0;
                const t = q * r;
                grandTotal += t;
                rows.push([i + 1, d, q, t > 0 ? t.toLocaleString('en-IN') : ""]);
            }

            doc.autoTable({
                startY: 82,
                head: [['Sr', 'Description', 'Qty', 'Total']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [245, 247, 250], textColor: [30, 41, 59], fontStyle: 'bold', lineWidth: 0.1, lineColor: [200, 200, 200] },
                styles: { fontSize: 10, cellPadding: 3, lineColor: [210, 215, 220], lineWidth: 0.1, textColor: [0, 0, 0] },
                columnStyles: { 0: { halign: 'center', cellWidth: 12 }, 1: { fontStyle: 'bold' }, 2: { halign: 'center', cellWidth: 15 }, 3: { halign: 'right', cellWidth: 35, fontStyle: 'bold' } }
            });

            // TOTALS
            const finalY = doc.lastAutoTable.finalY + 12;
            doc.setDrawColor(0); doc.setLineWidth(0.6); doc.line(15, finalY - 5, 195, finalY - 5);

            doc.setFontSize(12); doc.setFont(undefined, "bold"); doc.setTextColor(100);
            doc.text("Grand total-A", 140, finalY);
            doc.setFontSize(14); doc.setTextColor(0);
            doc.text("Rs. " + grandTotal.toLocaleString('en-IN'), 195, finalY, { align: 'right' });

            // WORDS
            doc.setFontSize(9); doc.setFont(undefined, "italic"); doc.setTextColor(120);
            doc.text("Amount in words: " + numberToWords(grandTotal) + " Only", 15, finalY + 12);

            // FOOTER
            doc.setFontSize(10); doc.setFont(undefined, "bold"); doc.setTextColor(0);
            doc.text("Receiver's Signature", 15, finalY + 35);
            doc.text("For, New Jay Bhavani Furniture", 195, finalY + 35, { align: 'right' });

            doc.save(`Bill_${document.getElementById('inCustName').value.replace(/\s+/g, '_')}.pdf`);
        }
        update();
    </script>
</body>

</html>
