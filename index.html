<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBF Bill System Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="src/css/styles.css">
</head>

<body x-data="billApp()">

    <!-- Mobile Navigation -->
    <nav class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-50 flex lg:hidden">
        <button type="button" @click="activeTab = 'edit'" id="tab-edit"
            :class="{ 'nav-tab-active': activeTab === 'edit' }"
            class="flex-1 py-4 uppercase text-[10px] tracking-widest">1. Edit Bill</button>
        <button type="button" @click="activeTab = 'preview'" id="tab-preview"
            :class="{ 'nav-tab-active': activeTab === 'preview', 'text-slate-400': activeTab !== 'preview' }"
            class="flex-1 py-4 uppercase text-[10px] tracking-widest">2. Preview</button>
    </nav>

    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- LEFT: EDITOR -->
        <div id="view-edit" :class="{ 'hidden': activeTab !== 'edit' }" class="w-full lg:w-1/3 bg-white p-6 border-r shadow-inner overflow-y-auto max-h-screen">
            <h1 class="text-2xl font-extrabold text-slate-900 mb-8 tracking-tight italic">JBF <span
                    class="font-light not-italic text-slate-400">Gen</span></h1>

            <div class="space-y-6">
                <!-- Customer Inputs -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Bill Details</label>
                    <input type="text" id="inCustName" x-model="customerName" placeholder="PARTY NAME"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all font-semibold">
                    <textarea id="inCustAddr" x-model="customerAddr" placeholder="ADDRESS"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 transition-all"
                        rows="2"></textarea>
                    <input type="date" id="inDate" x-model="invoiceDate"
                        class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-slate-900 font-medium">
                </div>

                <!-- Items Inputs -->
                <div id="itemInputs" class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Inventory List</label>

                    <template x-for="(item, index) in items" :key="index">
                        <div class="item-row bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3 relative group">
                            <button type="button" @click="removeItem(index)" class="absolute top-2 right-2 text-slate-300 hover:text-red-500">✕</button>
                            <input type="text" x-model="item.desc" placeholder="Description (e.g. Dining Table)"
                                class="w-full bg-transparent border-b border-slate-300 pb-2 inDesc font-medium outline-none focus:border-slate-900">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">Qty</span>
                                    <input type="number" x-model.number="item.qty" placeholder="0"
                                        class="w-full bg-transparent border-b border-slate-300 inQty outline-none focus:border-slate-900">
                                </div>
                                <div>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">Rate (₹)</span>
                                    <input type="number" x-model.number="item.rate" placeholder="0"
                                        class="w-full bg-transparent border-b border-slate-300 inRate outline-none focus:border-slate-900">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <button type="button" @click="addItem()"
                    class="w-full py-3 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:bg-slate-50 hover:text-slate-600 transition-all">+
                    Add Product</button>

                <button type="button" @click="downloadPDF()"
                    class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold shadow-xl shadow-slate-200 active:scale-95 transition-all">GENERATE
                    PDF BILL</button>
            </div>
        </div>

        <!-- RIGHT: PREVIEW -->
        <div id="view-preview" :class="{ 'hidden': activeTab === 'edit' }" class="hidden lg:block w-full lg:w-2/3 bg-slate-100 p-8 overflow-auto">
            <div id="preview-zoom">
                <div class="preview-paper text-slate-900 relative">
                    <!-- Header -->
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl font-black tracking-tight mb-1" x-text="brand.name">New Jay Bhavani Furniture</h2>
                            <p class="text-xs text-slate-500 leading-relaxed max-w-sm">
                                <template x-for="line in brand.addressLines" :key="line">
                                    <span x-text="line"></span><br>
                                </template>
                                <span x-text="brand.contactLine"></span>
                            </p>
                        </div>
                        <img id="logoImg" :src="brand.logoPath" class="w-24 h-24 object-contain" alt="Logo">
                    </div>
                    <div class="h-1 bg-slate-900 w-full mb-8"></div>

                    <!-- Meta -->
                    <div class="flex justify-between mb-10">
                        <div class="space-y-1">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Billed To</span>
                            <div id="outName" x-text="customerName.toUpperCase()" class="text-xl font-bold tracking-tight">SUMAN BHAI</div>
                            <div id="outAddr" x-text="customerAddr.toUpperCase()" class="text-sm text-slate-500 uppercase">ERU CHAR RASTA</div>
                        </div>
                        <div class="text-right space-y-1">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Date of Issue</span>
                            <div id="outDate" x-text="formatDate(invoiceDate)" class="text-lg font-bold">31/05/2026</div>
                        </div>
                    </div>

                    <!-- Live Table Preview -->
                    <table class="excel-table mb-8">
                        <thead>
                            <tr>
                                <th style="width: 8%; text-align: center;">Sr</th>
                                <th style="width: 47%;">Description</th>
                                <th style="width: 10%; text-align: center;">Qty</th>
                                <th style="width: 15%; text-align: right;">Rate</th>
                                <th style="width: 20%; text-align: right;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(item, index) in visibleItems" :key="index">
                                <tr>
                                    <td style="text-align: center; color: #cbd5e1;" x-text="index + 1"></td>
                                    <td class="font-bold" x-text="item.desc"></td>
                                    <td style="text-align: center;" x-text="item.qty || ''"></td>
                                    <td style="text-align: right;" x-text="formatNumber(item.rate)"></td>
                                    <td style="text-align: right; font-weight: 800;" x-text="formatNumber((item.qty || 0) * (item.rate || 0))"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <!-- Calculation Footer -->
                    <div class="flex justify-end pt-6 border-t-4 border-slate-900">
                        <div class="flex items-center gap-16">
                            <span class="text-sm font-bold text-slate-400 uppercase tracking-widest" x-text="labels.grandTotal">Grand total-A</span>
                            <span class="text-3xl font-black" id="outTotal" x-text="'Rs. ' + formatNumber(grandTotal)">Rs. 24,000</span>
                        </div>
                    </div>

                    <div class="mt-8 text-xs italic text-slate-400" id="outWords" x-text="amountInWords">Amount in words: ...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/config.js"></script>
    <script src="src/js/utils.js"></script>
    <script src="src/js/app.js"></script>
</body>

</html>
