<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBF Bill System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            background: white;
            margin: 0 auto;
            color: black;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #000;
        }

        .excel-table th {
            background: #f3f4f6;
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
            font-size: 10pt;
            font-weight: bold;
        }

        .excel-table td {
            border: 1px solid #000;
            padding: 6px 8px;
            height: 32px;
            font-size: 10pt;
        }

        @media (max-width: 768px) {
            #preview-zoom {
                transform: scale(0.42);
                transform-origin: top center;
                margin-bottom: -150%;
            }
        }

        .nav-tab-active {
            border-bottom: 3px solid black;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-slate-100">

    <!-- Mobile Nav -->
    <nav class="sticky top-0 bg-white border-b z-50 flex lg:hidden">
        <button onclick="switchTab('edit')" id="tab-edit" class="flex-1 py-4 nav-tab-active">EDIT</button>
        <button onclick="switchTab('preview')" id="tab-preview" class="flex-1 py-4 text-slate-500">PREVIEW</button>
    </nav>

    <div class="flex flex-col lg:flex-row">
        <!-- LEFT: INPUTS -->
        <div id="view-edit" class="w-full lg:w-1/3 bg-white p-6 shadow-xl z-10 border-r min-h-screen">
            <h1 class="text-xl font-bold mb-6 border-b pb-2">New Bill</h1>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Customer Name</label>
                    <input type="text" id="inCustName" oninput="updatePreview()"
                        class="w-full border-b-2 p-2 outline-none focus:border-blue-500" value="RAAJMAHAL DEVELOPERS">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Address</label>
                    <textarea id="inCustAddr" oninput="updatePreview()"
                        class="w-full border-b-2 p-2 outline-none focus:border-blue-500"
                        rows="2">RAAJMAHAL MALL DINDOLI SURAT</textarea>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">Date</label>
                    <input type="date" id="inDate" oninput="updatePreview()" class="w-full border-b-2 p-2 outline-none">
                </div>

                <div id="itemInputs" class="mt-8 space-y-3">
                    <label class="text-xs font-bold text-gray-400 uppercase">Items</label>
                    <div class="p-3 border rounded-lg bg-slate-50 space-y-2 relative">
                        <input type="text" placeholder="Description" class="w-full border-b bg-transparent inDesc"
                            oninput="updatePreview()" value="Meeting Table 12' x 6'">
                        <div class="flex gap-2">
                            <input type="text" placeholder="Qty" class="w-1/3 border-b bg-transparent inQty text-center"
                                oninput="updatePreview()">
                            <input type="number" placeholder="Amount"
                                class="w-2/3 border-b bg-transparent text-right inAmt font-bold"
                                oninput="updatePreview()" value="65000">
                        </div>
                    </div>
                </div>

                <button onclick="addNewRow()" class="w-full py-2 bg-slate-100 text-sm font-bold rounded">+ ADD
                    ITEM</button>

                <button onclick="downloadPDF()"
                    class="w-full mt-6 bg-black text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition">
                    DOWNLOAD PDF
                </button>
            </div>
        </div>

        <!-- RIGHT: PREVIEW -->
        <div id="view-preview" class="hidden lg:block w-full lg:w-2/3 bg-slate-200 p-4 lg:p-8 overflow-auto">
            <div id="preview-zoom">
                <div id="bill-preview" class="a4-page shadow-2xl">
                    <!-- Header -->
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl font-bold">New Jay Bhavani Furniture</h2>
                            <div class="text-sm mt-1 leading-relaxed">
                                Shop no. 5, Sai complex, Sitaram nagar, Eru char rasta,<br>
                                Abrama Road, Navsari - 396450<br>
                                Contact : 98252 98696 | jbf01nvs@gmail.com
                            </div>
                        </div>
                        <div class="w-24 h-24">
                            <img id="logoImg" src="logo.png" class="w-full h-full object-contain" alt="Logo">
                        </div>
                    </div>

                    <hr class="border-black mb-6">

                    <div class="flex justify-between mb-8">
                        <div class="w-2/3">
                            <span class="font-bold text-lg">To,</span><br>
                            <div id="outCustName" class="font-bold text-xl mt-1 uppercase">RAAJMAHAL DEVELOPERS</div>
                            <div id="outCustAddr" class="uppercase text-sm leading-tight">RAAJMAHAL MALL DINDOLI SURAT
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-bold">Date</span> &nbsp; <span id="outDate"
                                class="font-bold">16/04/2026</span>
                        </div>
                    </div>

                    <table class="excel-table">
                        <thead>
                            <tr>
                                <th style="width: 8%; text-align: center;">Sr</th>
                                <th style="width: 57%;">Description</th>
                                <th style="width: 10%; text-align: center;">Qty</th>
                                <th style="width: 25%; text-align: right;">Total</th>
                            </tr>
                        </thead>
                        <tbody id="outTableBody"></tbody>
                    </table>

                    <div class="mt-8 flex justify-end items-center">
                        <span class="text-lg font-bold mr-10">Grand total-A</span>
                        <span class="text-xl font-bold">Rs. <span id="outGrandTotal">65,000</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('inDate').valueAsDate = new Date();

        function switchTab(tab) {
            if (tab === 'edit') {
                document.getElementById('view-edit').classList.remove('hidden');
                document.getElementById('view-preview').classList.add('hidden');
                document.getElementById('tab-edit').classList.add('nav-tab-active');
                document.getElementById('tab-preview').classList.remove('nav-tab-active');
            } else {
                document.getElementById('view-edit').classList.add('hidden');
                document.getElementById('view-preview').classList.remove('hidden');
                document.getElementById('tab-preview').classList.add('nav-tab-active');
                document.getElementById('tab-edit').classList.remove('nav-tab-active');
                updatePreview();
            }
        }

        function addNewRow() {
            const div = document.createElement('div');
            div.className = 'p-3 border rounded-lg bg-slate-50 space-y-2 relative';
            div.innerHTML = `
                <button onclick="this.parentElement.remove(); updatePreview()" class="absolute top-1 right-2 text-red-400">✕</button>
                <input type="text" placeholder="Description" class="w-full border-b bg-transparent inDesc" oninput="updatePreview()">
                <div class="flex gap-2">
                    <input type="text" placeholder="Qty" class="w-1/3 border-b bg-transparent inQty text-center" oninput="updatePreview()">
                    <input type="number" placeholder="Amount" class="w-2/3 border-b bg-transparent text-right inAmt font-bold" oninput="updatePreview()">
                </div>`;
            document.getElementById('itemInputs').appendChild(div);
            updatePreview();
        }

        function updatePreview() {
            document.getElementById('outCustName').innerText = document.getElementById('inCustName').value.toUpperCase();
            document.getElementById('outCustAddr').innerText = document.getElementById('inCustAddr').value.toUpperCase();
            const dateVal = document.getElementById('inDate').value.split('-').reverse().join('/');
            document.getElementById('outDate').innerText = dateVal;

            const tbody = document.getElementById('outTableBody');
            tbody.innerHTML = '';
            let total = 0;

            const descs = document.querySelectorAll('.inDesc');
            const qtys = document.querySelectorAll('.inQty');
            const amts = document.querySelectorAll('.inAmt');

            for (let i = 0; i < 15; i++) {
                const row = tbody.insertRow();
                const d = descs[i]?.value || "";
                const q = qtys[i]?.value || "";
                const a = parseFloat(amts[i]?.value) || 0;
                total += a;

                row.innerHTML = `
                    <td class="text-center">${i + 1}</td>
                    <td>${d}</td>
                    <td class="text-center">${q}</td>
                    <td class="text-right">${a > 0 ? a.toLocaleString('en-IN') : ''}</td>`;
            }
            document.getElementById('outGrandTotal').innerText = total.toLocaleString('en-IN');
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            // 1. Header
            doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text("New Jay Bhavani Furniture", 15, 25);

            // --- UPDATED LOGO LOGIC WITH ASPECT RATIO ---
            try {
                const img = document.getElementById('logoImg');
                if (img && img.src) {
                    const maxWidth = 28;  // Max width in mm
                    const maxHeight = 28; // Max height in mm

                    let finalWidth = img.naturalWidth;
                    let finalHeight = img.naturalHeight;
                    const ratio = finalWidth / finalHeight;

                    // Calculate dimensions to fit within maxWidth/maxHeight while maintaining ratio
                    if (ratio > 1) {
                        finalWidth = maxWidth;
                        finalHeight = maxWidth / ratio;
                    } else {
                        finalHeight = maxHeight;
                        finalWidth = maxHeight * ratio;
                    }

                    // Right align based on calculated width (195 is right margin)
                    const xPos = 195 - finalWidth;
                    doc.addImage(img, 'PNG', xPos, 12, finalWidth, finalHeight);
                }
            } catch (e) { console.error("Logo error:", e); }

            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(["Shop no. 5, Sai complex, Sitaram nagar, Eru char rasta,", "Abrama Road, Navsari - 396450", "Contact : 98252 98696 | jbf01nvs@gmail.com"], 15, 32);
            doc.line(15, 48, 195, 48);

            // 2. To / Date
            doc.setFontSize(11); doc.setFont("helvetica", "normal");
            doc.text("To,", 15, 58);
            doc.setFont("helvetica", "bold"); doc.text("Date", 165, 58);
            doc.setFont("helvetica", "normal");
            doc.text(document.getElementById('outDate').innerText, 195, 58, { align: 'right' });

            doc.setFontSize(12); doc.setFont("helvetica", "bold");
            doc.text(document.getElementById('outCustName').innerText, 15, 65);
            doc.setFontSize(10); doc.setFont("helvetica", "normal");
            doc.text(document.getElementById('outCustAddr').innerText, 15, 71);

            // 3. Table
            const rows = [];
            let total = 0;
            const descs = document.querySelectorAll('.inDesc');
            const qtys = document.querySelectorAll('.inQty');
            const amts = document.querySelectorAll('.inAmt');

            for (let i = 0; i < 15; i++) {
                const d = descs[i]?.value || "";
                const q = qtys[i]?.value || "";
                const a = parseFloat(amts[i]?.value) || 0;
                total += a;
                rows.push([i + 1, d, q, a > 0 ? a.toLocaleString('en-IN') : ""]);
            }

            doc.autoTable({
                startY: 80,
                head: [['Sr', 'Description', 'Qty', 'Total']],
                body: rows,
                theme: 'grid',
                headStyles: { fillColor: [240, 240, 240], textColor: 0, lineWidth: 0.1, lineColor: 0 },
                styles: { fontSize: 10, cellPadding: 2, lineColor: 0, lineWidth: 0.1, textColor: 0, minCellHeight: 8.5 },
                columnStyles: { 0: { halign: 'center', cellWidth: 15 }, 2: { halign: 'center', cellWidth: 15 }, 3: { halign: 'right', cellWidth: 35 } }
            });

            // 4. Footer Total
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFont("helvetica", "bold");
            doc.text("Grand total-A", 145, finalY);
            doc.text("Rs. " + total.toLocaleString('en-IN'), 195, finalY, { align: 'right' });

            doc.line(15, 275, 195, 275);
            doc.save(`Bill_${Date.now()}.pdf`);
        }
        window.onload = updatePreview;
    </script>
</body>

</html>
